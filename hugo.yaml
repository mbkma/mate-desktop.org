baseURL: 'https://mate-desktop.org/'
title: 'MATE Desktop Environment'

enableRobotsTXT: true
defaultContentLanguage: 'en'
defaultContentLanguageInSubdir: false

# Parse Git commit
enableGitInfo: true

module:
  imports:
    - path: 'github.com/imfing/hextra'

# Summary length for blog previews (2-3 sentences)
summaryLength: 50

outputs:
  home: ['html', 'rss']
  page: ['html']
  section: ['html', 'rss']

languages:
  en:
    contentDir: content/en
    languageName: 'English'
    languageCode: 'en'
    weight: 1
    title: 'MATE Desktop Environment'
  de:
    contentDir: content/de
    languageName: 'Deutsch'
    languageCode: 'de'
    weight: 2
    title: 'MATE Desktop-Umgebung'
  es:
    contentDir: content/es
    languageName: 'Español'
    languageCode: 'es'
    weight: 3
    title: 'Entorno de Escritorio MATE'
  it:
    contentDir: content/it
    languageName: 'Italiano'
    languageCode: 'it'
    weight: 4
    title: 'Ambiente Desktop MATE'
  ja:
    contentDir: content/ja
    languageName: '日本語'
    languageCode: 'ja'
    weight: 5
    title: 'MATE デスクトップ環境'
  bg:
    contentDir: content/bg
    languageName: 'Български'
    languageCode: 'bg'
    weight: 6
    title: 'MATE Desktop Environment'
  ca:
    contentDir: content/ca
    languageName: 'Català'
    languageCode: 'ca'
    weight: 7
    title: "Entorn d'escriptori MATE"
  zh-cn:
    contentDir: content/zh-cn
    languageName: '简体中文'
    languageCode: 'zh-CN'
    weight: 8
    title: 'MATE 桌面环境'
  zh-tw:
    contentDir: content/zh-tw
    languageName: '繁體中文'
    languageCode: 'zh-TW'
    weight: 9
    title: 'MATE 桌面環境'
  he:
    contentDir: content/he
    languageName: 'עברית'
    languageCode: 'he'
    weight: 10
    title: 'MATE Desktop Environment'
  pl:
    contentDir: content/pl
    languageName: 'Polski'
    languageCode: 'pl'
    weight: 11
    title: 'MATE Desktop Environment'
  pt:
    contentDir: content/pt
    languageName: 'Português'
    languageCode: 'pt'
    weight: 12
    title: 'MATE Desktop Environment'
  pt-br:
    contentDir: content/pt-br
    languageName: 'Português (Brasil)'
    languageCode: 'pt-BR'
    weight: 13
    title: 'MATE Desktop Environment'
  ru:
    contentDir: content/ru
    languageName: 'Русский'
    languageCode: 'ru'
    weight: 14
    title: 'MATE Desktop Environment'
  sr:
    contentDir: content/sr
    languageName: 'Srpski'
    languageCode: 'sr'
    weight: 15
    title: 'MATE Desktop Environment'
  uk:
    contentDir: content/uk
    languageName: 'Українська'
    languageCode: 'uk'
    weight: 16
    title: 'MATE Desktop Environment'

params:
  description: 'MATE Desktop Environment - A continuation of GNOME 2'
  images:
    - images/mate.png
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: true

  theme:
    default: system
    displayToggle: true

  imageZoom:
    enable: false

  externalLinkDecoration: true

  search:
    enable: true
    type: 'flexsearch'
    flexsearch:
      index: 'content'
      tokenize: 'forward'

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: "images/mate.png"
      width: 40
      height: 40

  page:
    displayPagination: true

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
      sortBy: 'date'
      sortOrder: 'desc'

menu:
  main:
    - identifier: 'download'
      name: 'Download'
      pageRef: '/download'
      weight: 1
    - identifier: 'blog'
      name: 'Blog'
      pageRef: '/blog'
      weight: 2
    - identifier: 'documentation'
      name: 'Documentation'
      pageRef: '/docs'
      weight: 3
    - identifier: 'community'
      name: 'Community'
      pageRef: '/community'
      weight: 4
    - identifier: 'team'
      name: 'Team'
      pageRef: '/team'
      weight: 5
    - identifier: 'about'
      name: 'About'
      pageRef: '/about'
      weight: 6
    - identifier: 'search'
      name: 'Search'
      weight: 7
      params:
        type: 'search'
    - identifier: 'github'
      name: 'GitHub'
      url: 'https://github.com/mate-desktop'
      weight: 8
      params:
        icon: 'github'

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
